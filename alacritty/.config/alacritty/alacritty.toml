
[bell]
command = "None"
duration = 0

[cursor.style]
blinking = "Always"
shape = "Block"

[env]
TERM = "alacritty"

[font]
size = 18.0

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[[keyboard.bindings]]
chars = "\u001B[13;2u"
key = "Return"
mods = "Shift"

[[keyboard.bindings]]
chars = "\u001B[13;5u"
key = "Return"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[32;2u"
key = "Space"
mods = "Shift"

[[keyboard.bindings]]
chars = "\u001B[32;5u"
key = "Space"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001Bc"
key = "C"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001B[105;5u"
key = "I"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[106;5u"
key = "J"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[107;5u"
key = "K"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[46;5u"
key = "Period"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[44;5u"
key = "Comma"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[59;5u"
key = "Semicolon"
mods = "Control"

[scrolling]
history = 10000

[window]
decorations = "none"
opacity = 1
# Treat Option as Alt/Meta so terminal apps (fzf, zsh widgets, vim) receive
# ESC+key sequences for Option-letter combinations instead of macOS-native
# Unicode chars (∆, ∂, etc.). "Both" because this keyboard has only one
# Option key (fn replaces the right Option), and macOS may report a single
# Option as left or right depending on firmware — "Both" covers either case.
option_as_alt = "Both"

[general]
import = ["~/.config/alacritty/tokyonight.toml"]
